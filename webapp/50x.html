<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chyba serveru - CP Router Optimizer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 72px;
            margin: 0;
            color: #e94560;
        }
        h2 {
            font-size: 24px;
            margin: 20px 0;
            color: #ddd;
        }
        p {
            color: #888;
            margin: 10px 0;
        }
        a {
            color: #4ecdc4;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .actions {
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #4ecdc4;
            color: #1a1a2e;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin: 5px;
        }
        .btn:hover {
            background: #3db9b1;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️</h1>
        <h2>Došlo k chybě serveru</h2>
        <p>Omlouváme se, ale něco se pokazilo.</p>
        <p>Zkuste to prosím znovu za chvíli.</p>
        <div class="actions">
            <a href="/" class="btn">Zpět na úvod</a>
            <a href="/health" class="btn">Health Check</a>
        </div>
    </div>
</body>
</html>
